version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: laravel_postgres
    environment:
      POSTGRES_USER: laravel
      POSTGRES_PASSWORD: laravel_password
      POSTGRES_DB: laravel_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - laravel
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U laravel -d laravel_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: laravel_app
    ports:
      - "8000:8000"
    environment:
      - APP_ENV=local
      - APP_DEBUG=true
      - DB_CONNECTION=pgsql
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_DATABASE=laravel_db
      - DB_USERNAME=laravel
      - DB_PASSWORD=laravel_password
      - LOG_CHANNEL=stdout
    volumes:
      - .:/app
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      sh -c "php artisan migrate --force &&
             php artisan serve --host=0.0.0.0 --port=8000"
    networks:
      - laravel

volumes:
  postgres_data:

networks:
  laravel:
    driver: bridge
