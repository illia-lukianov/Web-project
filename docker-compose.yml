version: "3.9"

services:
  app:
    build: .
    container_name: laravel_app
    ports:
      - "8000:8000"
    environment:
      - APP_ENV=local
      - APP_DEBUG=true
      - DB_CONNECTION=sqlite
      - LOG_CHANNEL=stdout
    volumes:
      - .:/app
      - db_data:/app/database
    command: >
      sh -c "php artisan migrate --force &&
             php artisan serve --host=0.0.0.0 --port=8000"
    networks:
      - laravel

volumes:
  db_data:

networks:
  laravel:
    driver: bridge
