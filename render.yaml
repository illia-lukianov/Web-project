services:
  - type: web
    name: laravel-app
    env: docker
    region: ohio
    plan: free

    buildCommand: composer install --no-dev --optimize-autoloader && php artisan config:cache && php artisan route:cache

    envVars:
      - key: APP_NAME
        value: Laravel
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: APP_URL
        fromService:
          name: laravel-app
          type: web
          property: url
      - key: DB_CONNECTION
        value: sqlite
      - key: QUEUE_CONNECTION
        value: database
      - key: SESSION_DRIVER
        value: database
      - key: CACHE_STORE
        value: database
      - key: APP_KEY
        sync: false
      - key: LOG_CHANNEL
        value: stderr
