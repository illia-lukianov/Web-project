services:
  - type: web
    name: laravel-app
    env: docker
    region: ohio
    plan: free

    buildCommand: composer install --no-dev --optimize-autoloader && php artisan config:cache && php artisan route:cache

    envVars:
      - key: APP_NAME
        value: Laravel
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: APP_URL
        fromService:
          name: laravel-app
          type: web
          property: url
      - key: DB_CONNECTION
        value: pgsql
      - key: QUEUE_CONNECTION
        value: database
      - key: SESSION_DRIVER
        value: database
      - key: CACHE_STORE
        value: database
      - key: APP_KEY
        sync: false
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        sync: false
      - key: DB_DATABASE
        sync: false
      - key: DB_USERNAME
        sync: false
      - key: DB_PASSWORD
        sync: false

databases:
  - name: laravel-db
    engine: postgres
    version: "15"
    plan: free
